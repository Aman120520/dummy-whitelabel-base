name: Build Android - APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        type: string
      androidPackage:
        description: 'Android Package ID (e.g., com.company.appname)'
        required: true
        type: string
      clientId:
        description: 'Client/Organization ID'
        required: true
        type: string

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Configure white-label app
        run: node scripts/configure-white-label.js
        env:
          APP_NAME: ${{ github.event.inputs.appName }}
          ANDROID_PACKAGE: ${{ github.event.inputs.androidPackage }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Android APK & AAB
        run: |
          echo "=========================================="
          echo "Building Android APK & AAB"
          echo "=========================================="
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Package: ${{ github.event.inputs.androidPackage }}"
          echo "Client ID: ${{ github.event.inputs.clientId }}"
          echo ""
          cd android
          export NODE_OPTIONS="--max-old-space-size=4096"
          export _JAVA_OPTIONS="-Xmx4096m"
          echo "Building APK..."
          ./gradlew assembleRelease -x lint --no-daemon
          echo "Building AAB..."
          ./gradlew bundleRelease -x lint --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Success
        if: success()
        run: |
          echo "✅ Android Build Successful!"
          echo ""
          echo "App Details:"
          echo "  Name: ${{ github.event.inputs.appName }}"
          echo "  Package: ${{ github.event.inputs.androidPackage }}"
          echo "  Client ID: ${{ github.event.inputs.clientId }}"
          echo ""
          echo "📦 Download Artifacts:"
          echo ""
          echo "  APK (For direct install):"
          echo "  - Go to Actions tab"
          echo "  - Find this run"
          echo "  - Download artifact: ${{ github.event.inputs.appName }}-apk"
          echo ""
          echo "  AAB (For Play Store):"
          echo "  - Go to Actions tab"
          echo "  - Find this run"
          echo "  - Download artifact: ${{ github.event.inputs.appName }}-aab"
          echo ""
          echo "📊 View build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
