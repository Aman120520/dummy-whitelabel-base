name: Build iOS - TestFlight

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'iOS Bundle ID (e.g., com.company.appname)'
        required: true
        type: string
      clientId:
        description: 'Client/Organization ID'
        required: true
        type: string
      easProjectId:
        description: 'EAS Project ID for this client'
        required: false
        type: string

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Configure white-label app
        run: node scripts/configure-white-label.js
        env:
          APP_NAME: ${{ github.event.inputs.appName }}
          IOS_BUNDLE_ID: ${{ github.event.inputs.bundleId }}
          CLIENT_ID: ${{ github.event.inputs.clientId }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EAS_PROJECT_ID: ${{ github.event.inputs.easProjectId }}

      - name: Verify EXPO Token
        run: |
          echo "Testing EXPO_TOKEN authentication..."
          eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Validate eas.json
        run: |
          echo "Current eas.json configuration:"
          cat eas.json | jq '.'

      - name: Build iOS app with EAS
        run: |
          echo "=========================================="
          echo "Starting EAS iOS build"
          echo "=========================================="
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Bundle ID: ${{ github.event.inputs.bundleId }}"
          echo "Client ID: ${{ github.event.inputs.clientId }}"
          echo ""
          eas build --platform ios --profile production --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: |
          echo "Submitting to TestFlight..."
          eas submit --platform ios --profile production --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Success
        if: success()
        run: |
          echo "✅ iOS Build and TestFlight submission successful!"
          echo ""
          echo "App Details:"
          echo "  Name: ${{ github.event.inputs.appName }}"
          echo "  Bundle ID: ${{ github.event.inputs.bundleId }}"
          echo "  Client ID: ${{ github.event.inputs.clientId }}"
          echo ""
          echo "📱 Check TestFlight in ~15-20 minutes"
          echo "📊 View build: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
