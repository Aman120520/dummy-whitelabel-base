name: Build iOS & Android - Both

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'iOS Bundle ID (e.g., com.company.appname)'
        required: true
        type: string
      androidPackage:
        description: 'Android Package ID (e.g., com.company.appname)'
        required: true
        type: string
      clientId:
        description: 'Client/Organization ID'
        required: true
        type: string
      easProjectId:
        description: 'EAS Project ID for this client'
        required: false
        type: string

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Configure white-label app
        run: node scripts/configure-white-label.js
        env:
          APP_NAME: ${{ github.event.inputs.appName }}
          BUNDLE_ID: ${{ github.event.inputs.bundleId }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EAS_PROJECT_ID: ${{ github.event.inputs.easProjectId }}

      - name: Verify EXPO Token
        run: |
          echo "Testing EXPO_TOKEN authentication..."
          eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Validate eas.json
        run: |
          echo "Current eas.json configuration:"
          cat eas.json | jq '.'

      - name: Build iOS app with EAS
        run: |
          echo "=========================================="
          echo "Starting EAS iOS build"
          echo "=========================================="
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Bundle ID: ${{ github.event.inputs.bundleId }}"
          echo ""
          eas build --platform ios --profile production --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: |
          echo "Submitting to TestFlight..."
          eas submit --platform ios --profile production --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: iOS Success
        if: success()
        run: |
          echo "✅ iOS Build and TestFlight submission successful!"
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Bundle ID: ${{ github.event.inputs.bundleId }}"

  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Configure white-label app
        run: node scripts/configure-white-label.js
        env:
          APP_NAME: ${{ github.event.inputs.appName }}
          BUNDLE_ID: ${{ github.event.inputs.androidPackage }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Android APK
        run: |
          echo "=========================================="
          echo "Starting Android APK build"
          echo "=========================================="
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Package: ${{ github.event.inputs.androidPackage }}"
          echo ""
          cd android
          export NODE_OPTIONS="--max-old-space-size=4096"
          export _JAVA_OPTIONS="-Xmx4096m"
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-apk-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Android Success
        if: success()
        run: |
          echo "✅ Android APK build successful!"
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Package: ${{ github.event.inputs.androidPackage }}"

  summary:
    if: always()
    needs: [build_ios, build_android]
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "=========================================="
          echo "Build Complete - iOS & Android"
          echo "=========================================="
          echo ""
          echo "Client: ${{ github.event.inputs.clientId }}"
          echo "App: ${{ github.event.inputs.appName }}"
          echo ""
          echo "📱 iOS Status: ${{ needs.build_ios.result }}"
          echo "   → Submitted to TestFlight"
          echo "   → Check in 15-20 minutes"
          echo ""
          echo "🤖 Android Status: ${{ needs.build_android.result }}"
          echo "   → APK available in artifacts"
          echo "   → Download and distribute"
          echo ""
          echo "📊 View full logs:"
          echo "   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
