name: Build iOS & Android

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - ios
          - android
          - both
      appName:
        description: 'App Name (iOS only)'
        required: false
        type: string
      bundleId:
        description: 'iOS Bundle ID (e.g., com.company.appname) - iOS only'
        required: false
        type: string
      clientId:
        description: 'Client/Organization ID'
        required: true
        type: string

jobs:
  build_ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Configure white-label app
        run: node scripts/configure-white-label.js
        env:
          APP_NAME: ${{ github.event.inputs.appName }}
          BUNDLE_ID: ${{ github.event.inputs.bundleId }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify EXPO Token
        run: |
          echo "Testing EXPO_TOKEN authentication..."
          eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Validate eas.json
        run: |
          echo "Current eas.json configuration:"
          cat eas.json | jq '.'

      - name: Prebuild iOS native project
        run: |
          echo "=========================================="
          echo "Prebuilding iOS native project"
          echo "=========================================="
          npx expo prebuild --platform ios --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app with EAS
        run: |
          echo "=========================================="
          echo "Starting EAS build with production profile"
          echo "=========================================="
          echo "Build Profile: production"
          echo "Platform: iOS"
          echo "Wait for build: true"
          echo "Using remote credentials: true"
          echo ""
          eas build --platform ios --profile production --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: |
          echo "Starting TestFlight submission..."
          eas submit --platform ios --profile production --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: iOS Success
        if: success()
        run: |
          echo "✅ iOS Build and TestFlight submission successful!"
          echo "App: ${{ github.event.inputs.appName }}"
          echo "Bundle ID: ${{ github.event.inputs.bundleId }}"
          echo "Check TestFlight in ~15-20 minutes"

  build_android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android native project
        run: |
          echo "=========================================="
          echo "Prebuilding Android native project"
          echo "=========================================="
          npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          echo "=========================================="
          echo "Building Android APK (Release)"
          echo "=========================================="
          cd android
          export NODE_OPTIONS="--max-old-space-size=4096"
          export _JAVA_OPTIONS="-Xmx4096m"
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-unsigned
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Android Success
        if: success()
        run: |
          echo "✅ Android APK build successful!"
          echo "APK available in artifacts"
          echo "Client ID: ${{ github.event.inputs.clientId }}"

  summary:
    if: always()
    needs: [build_ios, build_android]
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "=========================================="
          echo "Build Pipeline Summary"
          echo "=========================================="
          echo "Platform: ${{ github.event.inputs.platform }}"
          echo "Client ID: ${{ github.event.inputs.clientId }}"
          echo ""
          echo "iOS Status: ${{ needs.build_ios.result }}"
          echo "Android Status: ${{ needs.build_android.result }}"
          echo ""
          echo "📊 View full logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
