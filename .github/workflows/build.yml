name: Generate Fast App (Android & iOS)
on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID (e.g., com.laundry.tayyar)'
        required: true
        type: string

jobs:
  # --- 🤖 ANDROID BUILD (Takes ~6 minutes) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17', cache: 'gradle' }
      
      - name: Install dependencies
        run: npm install

      - name: Update app.json (Android)
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.android = appJson.expo.android || {};
            appJson.expo.android.package = '${{ github.event.inputs.bundleId }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        
      - name: Build APK
        run: |
          cd android
          export NODE_OPTIONS="--max-old-space-size=4096"
          export _JAVA_OPTIONS="-Xmx4096m"
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/*.apk

  # --- 🍏 iOS TESTFLIGHT BUILD (Takes ~15-20 minutes) ---
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      
      - name: Install dependencies & Expo CLI
        run: |
          npm install
          npm install -g eas-cli

      - name: Update app.json (iOS)
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      # We decode your Apple Key so Fastlane/EAS can use it
      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          echo "${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # The magic command: Builds locally on the GitHub Mac runner, then uploads to TestFlight!
      - name: Build & Upload to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
        run: |
          eas build --platform ios --profile production --local --non-interactive
          eas submit --platform ios --latest --non-interactive