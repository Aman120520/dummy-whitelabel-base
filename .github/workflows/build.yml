name: Generate Fast App (iOS Only)
on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID (e.g., com.laundry.tayyar)'
        required: true
        type: string

jobs:
  # --- 🍏 iOS TESTFLIGHT BUILD ONLY (Expo EAS) ---
  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      
      - name: Install dependencies & Expo CLI
        run: |
          npm install
          npm install -g eas-cli

      - name: Update app.json AND eas.json (iOS)
        run: |
          node -e "
            const fs = require('fs');
            
            // 1. Update app.json with Bundle ID
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            appJson.expo.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));

            // 2. Update eas.json (Inject into BOTH build and submit profiles)
            const easJson = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            
            // Add Team ID to the build profile to prevent EAS disambiguation errors
            easJson.build = easJson.build || {};
            easJson.build.production = easJson.build.production || {};
            easJson.build.production.ios = easJson.build.production.ios || {};
            easJson.build.production.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';

            // Add App Store Connect details to the submit profile
            easJson.submit = easJson.submit || {};
            easJson.submit.production = easJson.submit.production || {};
            easJson.submit.production.ios = easJson.submit.production.ios || {};
            easJson.submit.production.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            easJson.submit.production.ios.appName = '${{ github.event.inputs.appName }}';
            easJson.submit.production.ios.sku = '${{ github.event.inputs.bundleId }}';
            easJson.submit.production.ios.language = 'en-US';
            
            fs.writeFileSync('eas.json', JSON.stringify(easJson, null, 2));
          "

      # Trigger Expo Cloud to handle the Apple Certificate creation, build, and TestFlight upload
      - name: Build & Upload to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          # Pass the raw base64 string safely as an environment variable first
          RAW_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
        run: |
          # Clean the Base64 string of absolutely all whitespace/newlines before exporting
          export EXPO_APPLE_APP_STORE_CONNECT_KEY_BASE64=$(echo "$RAW_P8_BASE64" | tr -d '[:space:]')
          
          eas build --platform ios --profile production --non-interactive --auto-submit