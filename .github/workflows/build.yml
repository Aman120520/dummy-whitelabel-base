name: Generate Fast App (Android & iOS)
on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID (e.g., com.laundry.tayyar)'
        required: true
        type: string

jobs:
  # --- 🤖 ANDROID BUILD (Takes ~6 minutes) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17', cache: 'gradle' }
      
      - name: Install dependencies
        run: npm install

      - name: Update app.json (Android)
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.android = appJson.expo.android || {};
            appJson.expo.android.package = '${{ github.event.inputs.bundleId }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        
      - name: Build APK
        run: |
          cd android
          export NODE_OPTIONS="--max-old-space-size=4096"
          export _JAVA_OPTIONS="-Xmx4096m"
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/*.apk

  # --- 🍏 iOS TESTFLIGHT BUILD (Handled via Expo Cloud) ---
  build-ios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      
      - name: Install dependencies & Expo CLI
        run: |
          npm install
          npm install -g eas-cli

      - name: Update app.json (iOS)
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            appJson.expo.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: 100% Auto-Create App Record in App Store Connect
        env:
          FASTLANE_OPT_OUT_USAGE: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
          APP_BUNDLE_ID: ${{ github.event.inputs.bundleId }}
          APP_NAME: ${{ github.event.inputs.appName }}
        run: |
          mkdir -p fastlane
          
          # FIX 1: Strip hidden spaces/newlines and decode directly INSIDE the fastlane folder
          echo "$ASC_KEY_BASE64" | tr -d '\n\r ' | base64 --decode > fastlane/AuthKey.p8
          
          # FIX 2: Create the Fastfile
          echo "
          default_platform(:ios)
          
          lane :create_app_shell do
            app_store_connect_api_key(
              key_id: ENV['ASC_KEY_ID'],
              issuer_id: ENV['ASC_ISSUER_ID'],
              key_filepath: 'AuthKey.p8', # It will successfully find it here now!
              in_house: false
            )
            
            produce(
              app_identifier: ENV['APP_BUNDLE_ID'],
              app_name: ENV['APP_NAME'],
              sku: ENV['APP_BUNDLE_ID'],
              language: 'English',
              skip_devcenter: true, # Skips Apple Developer Portal
              skip_itc: false
            )
          end
          " > fastlane/Fastfile
          
          fastlane create_app_shell

      # Trigger Expo Cloud to handle the Apple Certificate creation, build, and TestFlight upload
      - name: Build & Upload to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
        run: |
          eas build --platform ios --profile production --non-interactive --auto-submit