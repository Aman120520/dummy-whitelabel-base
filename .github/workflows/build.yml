name: Generate Fast iOS App

on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID'
        required: true
        type: string

jobs:
  build-ios-testflight:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧬 Apply White-Label Config
        run: |
          node -e "
            const fs = require('fs');

            // 1. Update app.json
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            appJson.expo.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));

            // 2. Inject App Store Connect details into eas.json
            const easJson = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            easJson.build = easJson.build || {};
            easJson.build.production = easJson.build.production || {};
            easJson.build.production.ios = easJson.build.production.ios || {};

            // CRITICAL: Ensure credentialsSource is set to 'local' for API key auth
            easJson.build.production.ios.credentialsSource = 'local';

            easJson.submit = easJson.submit || {};
            easJson.submit.production = easJson.submit.production || {};
            easJson.submit.production.ios = easJson.submit.production.ios || {};

            delete easJson.submit.production.ios.ascAppId;
            easJson.submit.production.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            easJson.submit.production.ios.appName = '${{ github.event.inputs.appName }}';
            easJson.submit.production.ios.sku = '${{ github.event.inputs.bundleId }}';

            fs.writeFileSync('eas.json', JSON.stringify(easJson, null, 2));
            console.log('✅ eas.json updated with credentialsSource: local');
          "

      - name: 🚀 Build and Submit to TestFlight
        env:
          EXPO_APPLE_APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          RAW_P8: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
        run: |
          export EXPO_APPLE_APP_STORE_CONNECT_KEY_BASE64=$(echo "$RAW_P8" | base64)
          eas build --platform ios --profile production --non-interactive
          eas submit --platform ios --profile production --latest --non-interactive --no-wait