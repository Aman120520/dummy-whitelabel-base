name: Generate Fast App (iOS Only)

on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID (e.g., com.laundry.tayyar)'
        required: true
        type: string

jobs:
  build-ios-testflight:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: 🛠️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          eas-cache: false # Disables the buggy cache 

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧬 Apply White-Label Config
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            appJson.expo.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: 🏗️ Build & Submit to TestFlight
        env:
          # EAS CLI strictly requires these locally to validate certificates before sending the build!
          EXPO_APPLE_APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          EXPO_APPLE_APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          RAW_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_P8_BASE64 }}
        run: |
          # The absolute safest way to pass the Base64 key: strip all hidden newlines/spaces
          export EXPO_APPLE_APP_STORE_CONNECT_KEY_BASE64=$(echo "$RAW_P8_BASE64" | tr -d '[:space:]')
          
          eas build --platform ios --profile production --non-interactive --auto-submit