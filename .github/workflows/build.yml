name: Generate Fast APK
on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4
      - uses: actions/checkout@v4

      # Updated to v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Updated to v4
      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # This injects your dynamic app icon, name, and package name into the native code
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # This compiles the APK directly on GitHub, bypassing the Expo Queue!
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      # Updated to v4 - This fixes your exact error
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk