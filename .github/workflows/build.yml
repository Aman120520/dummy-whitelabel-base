name: Generate Fast App (iOS Only)

on:
  workflow_dispatch:
    inputs:
      clientId:
        description: 'Organization ID / Client ID'
        required: true
        type: string
      appName:
        description: 'App Name'
        required: true
        type: string
      bundleId:
        description: 'App Bundle ID (e.g., com.laundry.tayyar)'
        required: true
        type: string

jobs:
  build-ios-testflight:
    # EAS builds happen in Expo's cloud, so we can use a fast ubuntu runner to trigger it!
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: 🛠️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
          eas-cache: false # Disables the buggy cache

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧬 Apply White-Label Config
        run: |
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.name = '${{ github.event.inputs.appName }}';
            appJson.expo.ios = appJson.expo.ios || {};
            appJson.expo.ios.bundleIdentifier = '${{ github.event.inputs.bundleId }}';
            appJson.expo.ios.appleTeamId = '${{ secrets.APPLE_TEAM_ID }}';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: 🏗️ Build & Submit to TestFlight
        run: eas build --platform ios --profile production --non-interactive --auto-submit